version: '3.8'

services:
  db_container:
    image: postgres:15-alpine
    container_name: db_container
    environment:
      POSTGRES_DB: vzeta_db
      POSTGRES_USER: vzeta_user
      POSTGRES_PASSWORD: vzeta_password
    volumes:
      - vzeta_db_data:/var/lib/postgresql/data
    networks:
      - vzeta_network
    restart: always

  myapp_container:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myapp_container
    environment:
      DB_HOST: db_container
      DB_NAME: vzeta_db
      DB_USER: vzeta_user
      DB_PASSWORD: vzeta_password
    depends_on:
      - db_container
    networks:
      - vzeta_network
    restart: always

  mynginx_container:
    image: nginx:alpine
    container_name: mynginx_container
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - myapp_container
    networks:
      - vzeta_network
    restart: always

volumes:
  vzeta_db_data:

networks:
  vzeta_network:
    driver: bridge
